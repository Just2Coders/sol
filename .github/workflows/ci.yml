name: CI

# Corre en cada PR y en los push a main. Es el árbitro imparcial:
# clona limpio en Linux y verifica lint + tipos + build antes de mergear.
on:
  pull_request:
  push:
    branches: [main, dev]

# Cancela ejecuciones viejas del mismo PR si llega un push nuevo (ahorra minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # 'npm ci' instala EXACTO lo del package-lock y nunca lo reescribe.
      # Falla si el lock no cuadra, en vez de arreglarlo en silencio.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx --no-install tsc --noEmit

      # El build importa lib/db, que exige estas variables aunque no se conecte.
      # Son valores dummy: en CI no se toca la base de datos real.
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgres://user:pass@localhost:5432/db
          SESSION_SECRET: ci-dummy-secret-not-used-in-production
